# The legacy "@netlify/plugin-sitemap" build plugin is still installed via the
# Netlify UI. It used to generate the old static sitemap, but @nuxtjs/sitemap
# now owns /sitemap.xml — prerendered as a `sitemap.xml/` directory. The legacy
# plugin tries to open `dist/sitemap.xml` as a file and crashes with EISDIR.
# Declaring the same plugin here lets netlify.toml take precedence over the UI
# config, so it runs once with these inputs: redirect its output to a throwaway
# file that doesn't collide with the directory.
# TODO: remove this plugin in the Netlify UI, then delete this block.
[[plugins]]
  package = "@netlify/plugin-sitemap"
  [plugins.inputs]
    filePath = "sitemap-legacy.xml"

# Security headers applied to every response.
# Note: only headers are defined here — the build command and publish
# directory stay configured in the Netlify UI, so this file does not change
# how the site is built or deployed.
#
# The CSP is sent as Report-Only on purpose: it reports violations without
# enforcing, so it cannot break the live site. Promote it to an enforcing
# `Content-Security-Policy` once the browser console shows no violations
# (and ideally after the SSR migration, when inline scripts can be hashed).
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Content-Security-Policy-Report-Only = "default-src 'self'; script-src 'self' 'unsafe-inline' https://analytics.umami.is; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://analytics.umami.is; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"
